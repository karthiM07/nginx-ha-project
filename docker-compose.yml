version: "3.9"

services:

  # ----------------------------------
  # Load Balancer (Simulating AWS ALB)
  # ----------------------------------
  loadbalancer:
    image: nginx:latest
    container_name: nginx-loadbalancer

    ports:
      - "8080:80"   # access via localhost:8080

    volumes:
      # custom nginx config for load balancing
      - ./loadbalancer/nginx.conf:/etc/nginx/nginx.conf

    depends_on:
      - nginx1
      - nginx2
      - nginx3

    networks:
      - webnet


  # ----------------------------------
  # Web Server 1 (Simulating EC2)
  # ----------------------------------
  nginx1:
    image: nginx:latest
    container_name: nginx-server-1

    volumes:
      # Local directory mapped as website
      - ./nginx1:/usr/share/nginx/html

    networks:
      - webnet


  # ----------------------------------
  # Web Server 2 (Simulating EC2)
  # ----------------------------------
  nginx2:
    image: nginx:latest
    container_name: nginx-server-2

    volumes:
      # Local directory mapped as website
      - ./nginx1:/usr/share/nginx/html

    networks:
      - webnet


# ----------------------------------

  # Web Server 3 (Simulating EC2)
  # ----------------------------------
  nginx3:
    image: nginx:latest
    container_name: nginx-server-3

    volumes:
      # Local directory mapped as website
      - ./nginx1:/usr/share/nginx/html

    networks:
      - webnet

# Internal Docker Network
# Simulates VPC Network
# ----------------------------------
networks:
  webnet:
    driver: bridge